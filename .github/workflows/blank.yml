name: nodeseek鸡腿签到

on:
  push:
    branches:
      - main
  schedule:
    - cron: '00 16 * * *'  # 北京时间 00:00 (UTC+8)，对应UTC时间 16:00
  workflow_dispatch:

permissions:
  contents: read
  actions: write  # 添加写入Actions变量的权限

jobs:
  run-nodeseek-sign:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v3
      
      - name: 配置Python环境
        uses: actions/setup-python@v2
        with:
          python-version: '3.11.8'

      - name: 安装依赖包
        run: |
          pip install curl_cffi requests

      - name: 运行签到脚本
        env:
          # 基本账号（NS_ 前缀，避免与系统变量 USER 冲突）
          NS_USER: ${{ secrets.NS_USER }}
          NS_PASS: ${{ secrets.NS_PASS }}

          # 额外账号1-5
          NS_USER1: ${{ secrets.NS_USER1 }}
          NS_PASS1: ${{ secrets.NS_PASS1 }}
          NS_USER2: ${{ secrets.NS_USER2 }}
          NS_PASS2: ${{ secrets.NS_PASS2 }}
          NS_USER3: ${{ secrets.NS_USER3 }}
          NS_PASS3: ${{ secrets.NS_PASS3 }}
          NS_USER4: ${{ secrets.NS_USER4 }}
          NS_PASS4: ${{ secrets.NS_PASS4 }}
          NS_USER5: ${{ secrets.NS_USER5 }}
          NS_PASS5: ${{ secrets.NS_PASS5 }}
          
          # Cookie配置
          NS_COOKIE: ${{ vars.NS_COOKIE || secrets.NS_COOKIE }}
          
          # 验证码配置
          SOLVER_TYPE: ${{ secrets.SOLVER_TYPE }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CLIENTT_KEY: ${{ secrets.CLIENTT_KEY }}
          
          # GitHub API配置
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          
          # 通知推送配置
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        run: python nodeseek_sign.py
